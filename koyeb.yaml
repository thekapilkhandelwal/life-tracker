# Deploy: https://app.koyeb.com/deploy?name=life-tracker&repository=github.com/thekapilkhandelwal/life-tracker
name: life-tracker
service:
  type: web
  docker:
    dockerfile: backend/Dockerfile
    docker_workdir: backend
  instance_types:
    - type: free
      regions:
        - fra
  env:
    - key: DEMO_LOGIN_ENABLED
      value: "true"
    - key: GOOGLE_OAUTH_ENABLED
      value: "false"
    - key: COOKIE_SECURE
      value: "true"
    - key: COOKIE_SAME_SITE
      value: None
    - key: PORT
      value: "8080"
  ports:
    - port: 8080
      protocol: http
  routes:
    - path: /
      port: 8080
  health_checks:
    - grace_period: 120
      interval: 30
      timeout: 10
      path: /actuator/health
      port: 8080
